<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Level Dropdown</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom styling to show nested dropdowns properly */
        .dropdown-menu .dropdown-menu {
            left: 100%;
            top: 0;
            margin-left: 0.1rem;
        }
        .dropdown-menu .dropdown-item:hover + .dropdown-menu {
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Brand</a>

                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a href="index" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="about" class="nav-link active">About</a></li>

                    <!-- Services Dropdown -->
                    <li class="nav-item dropdown">
                        <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Services</a>
                        <ul class="dropdown-menu">
                            <!-- Service 1 -->
                            <li class="dropdown">
                                <a href="#" class="dropdown-item dropdown-toggle" data-bs-toggle="dropdown">Service 1</a>
                                <ul class="dropdown-menu">
                                    <li><a href="service-1-1.html" class="dropdown-item">Sub-service 1.1</a></li>
                                    <li><a href="service-1-2.html" class="dropdown-item">Sub-service 1.2</a></li>
                                </ul>
                            </li>
                            <!-- Service 2 -->
                            <li class="dropdown">
                                <a href="#" class="dropdown-item dropdown-toggle" data-bs-toggle="dropdown">Service 2</a>
                                <ul class="dropdown-menu">
                                    <li><a href="service-2-1.html" class="dropdown-item">Sub-service 2.1</a></li>
                                    <li><a href="service-2-2.html" class="dropdown-item">Sub-service 2.2</a></li>
                                </ul>
                            </li>
                            <!-- Service 3 -->
                            <li class="dropdown">
                                <a href="#" class="dropdown-item dropdown-toggle" data-bs-toggle="dropdown">Service 3</a>
                                <ul class="dropdown-menu">
                                    <li><a href="service-3-1.html" class="dropdown-item">Sub-service 3.1</a></li>
                                    <li><a href="service-3-2.html" class="dropdown-item">Sub-service 3.2</a></li>
                                </ul>
                            </li>
                            <!-- Add more services as needed -->
                        </ul>
                    </li>
                    <li class="nav-item"><a href="contact" class="nav-link">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
